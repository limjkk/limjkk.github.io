<!DOCTYPE html>
<html style="font-size: 16px;">
  <head>
  <link rel="stylesheet" href="assets/css/contactus.css">
  </head>
    <body>
      <header>
      	<h1>Contact us</h1>
      </header>

      <div id="form">

      <div class="fish" id="fish"></div>
      <div class="fish" id="fish2"></div>

      <form id="gform" method="post"
      action = "https://script.google.com/macros/s/AKfycbwX97nrbOxRWYEC-2UcoKRrN2rW7fnqR6XSbAvr-0cCcRzAkE0/exec">

      <div class="gform" id="name-form">
          <label for="name">Your name*</label>
          <input type="text" id="name" name="name" />
      </div>

      <div class="gform" id="email-form">
          <label for="email">Your e-mail*</label>
          <input type="email" id="email" name="email" />
      </div>

      <div class="gform" id="message-form">
          <label for="message">Your message</label>
          <textarea id="message" name="message"></textarea>
      </div>

      	<input type="submit" value="Send message" />
      </form>
      </div>
  </body>
</html>
